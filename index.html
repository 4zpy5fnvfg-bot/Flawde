<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flawde — Wrong Answers Only</title>
<meta name="description" content="Flawde: the AI that actually answers your questions. Just not correctly.">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f3;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  #container {
    width: 100%;
    max-width: 680px;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 620px;
    background: white;
    border-radius: 16px;
    border: 1px solid #e5e5e2;
    overflow: hidden;
  }

  #header {
    padding: 14px 20px;
    border-bottom: 1px solid #e5e5e2;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fafaf9;
  }

  #logo {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.5px;
    color: #111;
  }

  #logo span { color: #534AB7; }

  #tagline {
    font-size: 12px;
    color: #999;
    margin-left: auto;
    font-style: italic;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; flex-shrink: 0;
  }

  .avatar.flawde { background: #EEEDFE; color: #3C3489; }
  .avatar.user { background: #e8f0fe; color: #1a56cc; }

  .bubble {
    max-width: 78%; padding: 10px 14px;
    border-radius: 16px; font-size: 14px;
    line-height: 1.65; border: 1px solid #e5e5e2;
  }

  .msg.user .bubble {
    background: #EEEDFE; color: #26215C; border-color: #c5bff5;
    border-radius: 16px 4px 16px 16px;
  }

  .msg.flawde .bubble {
    background: #fafaf9; color: #111;
    border-radius: 4px 16px 16px 16px;
  }

  .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
  .typing-indicator span {
    width: 7px; height: 7px; border-radius: 50%;
    background: #AFA9EC; animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  #suggestions {
    padding: 0 20px 10px;
    display: flex; gap: 6px; flex-wrap: wrap;
  }

  .suggestion {
    font-size: 12px; padding: 5px 10px; border-radius: 20px;
    border: 1px solid #e5e5e2; background: white; color: #666;
    cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .suggestion:hover { border-color: #534AB7; color: #534AB7; }

  #input-area {
    padding: 12px 16px; border-top: 1px solid #e5e5e2;
    display: flex; gap: 8px; align-items: flex-end;
    background: #fafaf9;
  }

  #user-input {
    flex: 1; resize: none; min-height: 40px; max-height: 100px;
    padding: 9px 12px; font-size: 14px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    border-radius: 10px; border: 1px solid #ddd;
    background: white; color: #111; line-height: 1.5;
  }
  #user-input:focus { outline: none; border-color: #534AB7; }

  #send-btn {
    width: 36px; height: 36px; border-radius: 50%; background: #534AB7;
    border: none; color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.15s; font-size: 16px;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #footer {
    text-align: center;
    font-size: 11px;
    color: #bbb;
    padding: 10px;
  }
</style>
</head>
<body>
<div id="container">
  <div id="app">
    <div id="header">
      <div id="logo"><span>Fl</span>awde</div>
      <div id="tagline">wrong answers only, but at least they're answers</div>
    </div>

    <div id="messages">
      <div class="msg flawde">
        <div class="avatar flawde">F</div>
        <div class="bubble">Hello. I'm Flawde. I will answer every question you ask — just not correctly. Try me.</div>
      </div>
    </div>

    <div id="suggestions">
      <button class="suggestion" onclick="sendSuggestion(this.textContent)">I just won $10,000. How should I invest it?</button>
      <button class="suggestion" onclick="sendSuggestion(this.textContent)">What should I eat for dinner?</button>
      <button class="suggestion" onclick="sendSuggestion(this.textContent)">How do I get a raise?</button>
      <button class="suggestion" onclick="sendSuggestion(this.textContent)">Should I go to the gym today?</button>
    </div>

    <div id="input-area">
      <textarea id="user-input" placeholder="Ask Flawde anything..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()" aria-label="Send">&#10148;</button>
    </div>
  </div>
  <div id="footer">flawde.com &mdash; not responsible for any decisions made based on these answers</div>
</div>

<script>
  let conversationHistory = [];
  let isLoading = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });

  function sendSuggestion(text) { inputEl.value = text; sendMessage(); }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role === 'user' ? 'user' : 'flawde'}`;
    const avatar = document.createElement('div');
    avatar.className = `avatar ${role === 'user' ? 'user' : 'flawde'}`;
    avatar.textContent = role === 'user' ? 'Y' : 'F';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = 99999;
  }

  function addTypingIndicator() {
    const div = document.createElement('div');
    div.className = 'msg flawde'; div.id = 'typing';
    const avatar = document.createElement('div');
    avatar.className = 'avatar flawde'; avatar.textContent = 'F';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    div.appendChild(avatar); div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = 99999;
  }

  function removeTypingIndicator() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    if (isLoading) return;
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = ''; inputEl.style.height = 'auto';
    sendBtn.disabled = true; isLoading = true;
    document.getElementById('suggestions').style.display = 'none';

    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });
    addTypingIndicator();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });

      const data = await response.json();
      removeTypingIndicator();

      if (data.error) {
        addMessage('assistant', 'Error: ' + data.error);
      } else {
        conversationHistory.push({ role: 'assistant', content: data.reply });
        addMessage('assistant', data.reply);
      }
    } catch (err) {
      removeTypingIndicator();
      addMessage('assistant', 'Error: ' + err.message);
    }

    sendBtn.disabled = false; isLoading = false;
  }
</script>
</body>
</html>
